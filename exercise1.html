<body>
    <!-- header -->
    <header class="header">

    <div class="container">
        <div class="calculator-card">
            <h1>គណនាថ្លៃអគ្គិសនី</h1>
            
            <form id="electricityForm" onsubmit="calculateBill(event)">
                <div class="form-group">
                    <label>លេខគីឡូចាស់ (គីឡូវ៉ាត់ម៉ោង):</label>
                    <div class="input-group">
                        <input type="number" 
                               id="oldMeter"
                               min="0" 
                               step="0.01" 
                               required 
                               placeholder="1250.5">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>លេខគីឡូថ្មី (គីឡូវ៉ាត់ម៉ោង):</label>
                    <div class="input-group">
                        <input type="number" 
                               id="newMeter"
                               min="0" 
                               step="0.01" 
                               required 
                               placeholder="1350.5">
                    </div>
                </div>
                
                <button type="submit" class="btn-calculate">គណនា</button>
            </form>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <div id="resultBox" class="result-box" style="display: none;">
                <div class="result-header">
                    <h3>លទ្ធផលគណនា</h3>
                    <span id="kwhBadge" class="kwh-badge">0 kWh</span>
                </div>
                
                <div class="meter-info">
                    <div class="meter-info-item">
                        <div class="meter-info-label">លេខគីឡូចាស់</div>
                        <div id="oldMeterDisplay" class="meter-info-value">0.00</div>
                    </div>
                    <div class="meter-info-item">
                        <div class="meter-info-label">លេខគីឡូថ្មី</div>
                        <div id="newMeterDisplay" class="meter-info-value">0.00</div>
                    </div>
                    <div class="meter-info-item">
                        <div class="meter-info-label">ប្រើប្រាស់សរុប</div>
                        <div id="totalKwhDisplay" class="meter-info-value">0.00</div>
                    </div>
                </div>
                
                <h4 style="color: #1e3c72; margin-bottom: 15px;">ព័ត៌មានលម្អិត</h4>
                
                <table class="details-table">
                    <thead>
                        <tr>
                            <th>លេខ ID</th>
                            <th>គីឡូ(kWh)</th>
                            <th>បរិមាណប្រើ</th>
                            <th>តម្លៃ/kWh</th>
                            <th>ត្រូវបង់ថ្លៃ</th>
                        </tr>
                    </thead>
                    <tbody id="detailsTableBody">
                    </tbody>
                </table>
                
                <div style="margin-top: 20px; text-align: right; font-size: 1.2rem;">
                    <span style="color: #4a5568;">ថ្លៃសេវា:</span>
                    <span id="serviceCharge" style="font-weight: 600; color: #1e3c72;">0 រៀល</span>
                </div>
                <div style="margin-top: 10px; text-align: right; font-size: 1.4rem; border-top: 2px solid #e2e8f0; padding-top: 10px;">
                    <span style="color: #4a5568;">សរុប:</span>
                    <span id="totalAmount" style="font-weight: 700; color: #667eea;">0 រៀល</span>
                </div>
            </div>
            
            <a href="#" onclick="resetForm(event)" class="reset-btn">គណនាថ្មី</a>
        </div>
    </div>
    
    <!-- script -->
    <script>
        // Electricity Bill Calculator Class
        class ElectricityBillCalculator {
            constructor() {
                // តម្លៃក្នុងមួយគីឡូវ៉ាត់ម៉ោង (រៀល)
                this.rates = [
                    { min: 0, max: 50, rate: 610 },     // 0-50 kWh
                    { min: 51, max: 100, rate: 720 },   // 51-100 kWh
                    { min: 101, max: 200, rate: 830 },  // 101-200 kWh
                    { min: 201, max: 300, rate: 940 },  // 201-300 kWh
                    { min: 301, max: 400, rate: 1050 }, // 301-400 kWh
                    { min: 401, max: Infinity, rate: 1160 } // >400 kWh
                ];
                
                this.serviceCharge = 3800; // ថ្លៃសេវាប្រចាំខែ
            }
            
            calculate(oldMeter, newMeter) {
                // គណនាចំនួនគីឡូវ៉ាត់ម៉ោងដែលប្រើប្រាស់
                const kwh = newMeter - oldMeter;
                
                if (kwh < 0) {
                    return { error: 'លេខគីឡូថ្មីត្រូវតែធំជាងលេខវាស់ចាស់' };
                }
                
                if (kwh === 0) {
                    return { error: 'មិនមានការប្រើប្រាស់អគ្គិសនីទេ' };
                }
                
                return this.calculateBill(kwh, oldMeter, newMeter);
            }
            
            calculateBill(kwh, oldMeter, newMeter) {
                let total = 0;
                let remainingKwh = kwh;
                let details = [];
                
                for (let index = 0; index < this.rates.length; index++) {
                    if (remainingKwh <= 0) break;
                    
                    const rate = this.rates[index];
                    const tierRange = rate.max - rate.min + 1;
                    const kwhInTier = Math.min(remainingKwh, tierRange);
                    const cost = kwhInTier * rate.rate;
                    
                    details.push({
                        tier: index + 1,
                        range: rate.max === Infinity ? 
                               `${rate.min}+ kWh` : 
                               `${rate.min}-${rate.max} kWh`,
                        kwh: kwhInTier,
                        rate: rate.rate,
                        cost: cost
                    });
                    
                    total += cost;
                    remainingKwh -= kwhInTier;
                }
                
                const totalWithService = total + this.serviceCharge;
                
                return {
                    kwh: kwh,
                    old_meter: oldMeter,
                    new_meter: newMeter,
                    details: details,
                    energy_cost: total,
                    service_charge: this.serviceCharge,
                    total: totalWithService
                };
            }
            
            formatCurrency(amount) {
                return amount.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' រៀល';
            }
        }
        
        // Initialize calculator
        const calculator = new ElectricityBillCalculator();
        
        // Calculate bill function
        function calculateBill(event) {
            event.preventDefault();
            
            // Get input values
            const oldMeter = parseFloat(document.getElementById('oldMeter').value) || 0;
            const newMeter = parseFloat(document.getElementById('newMeter').value) || 0;
            
            // Calculate
            const result = calculator.calculate(oldMeter, newMeter);
            
            // Hide error message initially
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            
            // Check for error
            if (result.error) {
                errorDiv.textContent = result.error;
                errorDiv.style.display = 'block';
                document.getElementById('resultBox').style.display = 'none';
                return;
            }
            
            // Display results
            displayResults(result);
        }
        
        // Display results function
        function displayResults(result) {
            // Show result box
            document.getElementById('resultBox').style.display = 'block';
            
            // Update badge and displays
            document.getElementById('kwhBadge').textContent = result.kwh + ' kWh';
            document.getElementById('oldMeterDisplay').textContent = result.old_meter.toFixed(2);
            document.getElementById('newMeterDisplay').textContent = result.new_meter.toFixed(2);
            document.getElementById('totalKwhDisplay').textContent = result.kwh.toFixed(2);
            
            // Update table
            const tableBody = document.getElementById('detailsTableBody');
            tableBody.innerHTML = '';
            
            result.details.forEach(detail => {
                const row = tableBody.insertRow();
                row.innerHTML = `
                    <td>${detail.tier}</td>
                    <td>${detail.range}</td>
                    <td>${detail.kwh} kWh</td>
                    <td>${detail.rate.toLocaleString()} រៀល</td>
                    <td>${detail.cost.toLocaleString()} រៀល</td>
                `;
            });
            
            // Update totals
            document.getElementById('serviceCharge').textContent = calculator.formatCurrency(result.service_charge);
            document.getElementById('totalAmount').textContent = calculator.formatCurrency(result.total);
        }
        
        // Reset form function
        function resetForm(event) {
            event.preventDefault();
            document.getElementById('electricityForm').reset();
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
