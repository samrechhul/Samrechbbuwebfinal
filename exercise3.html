<body>

        <div class="calculator-card">
            <h1>គណនាលទ្ធផលប្រចាំឆ្នាំនិស្សិត</h1>
            <!--
            <div class="info-box">
                <h3>លក្ខខណ្ឌក្នុងការវាយតម្លៃ៖</h3>
                <ul>
                    <li><strong>អវត្តមាន ≥ 16 ដង:</strong> រៀនសងឡើងវិញ</li>
                    <li><strong>អវត្តមាន 11-15 ដង:</strong> ប្រលងសង</li>
                    <li><strong>អវត្តមាន ≤ 10 ដង:</strong> មានសិទ្ធិប្រលងធម្មតា</li>
                    <li><strong>ពិន្ទុ Midterm < 20:</strong> រៀនសងឡើងវិញ</li>
                    <li><strong>ពិន្ទុ Midterm ≥ 20 និង Total < 60:</strong> ប្រលងសង</li>
                    <li><strong>ពិន្ទុ Midterm ≥ 20 និង Total ≥ 60:</strong> ប្រលងជាប់</li>
                </ul>
            </div>
            -->
            <form id="studentForm" onsubmit="calculateResult(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="student_name">ឈ្មោះនិស្សិត៖</label>
                        <input type="text" 
                               id="student_name" 
                               name="student_name" 
                               placeholder="សូមបញ្ចូលឈ្មោះនិស្សិត"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="absent_days">ចំនួនអវត្តមាន (ថ្ងៃ)៖</label>
                        <input type="number" 
                               id="absent_days" 
                               name="absent_days" 
                               min="0" 
                               max="100"
                               placeholder="ឧ. 10"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="midterm_score">ពិន្ទុ Midterm (0-60)៖</label>
                        <input type="number" 
                               id="midterm_score" 
                               name="midterm_score" 
                               min="0" 
                               max="100"
                               step="0.01"
                               placeholder="ឧ. 45"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="final_score">ពិន្ទុ Final (0-40)៖</label>
                        <input type="number" 
                               id="final_score" 
                               name="final_score" 
                               min="0" 
                               max="100"
                               step="0.01"
                               placeholder="ឧ. 30"
                               required>
                    </div>
                </div>

                <button type="submit" class="btn-calculate">
                    គណនាលទ្ធផល
                </button>
            </form>

            <div id="resultContainer" style="display: none;"></div>
            <div id="errorContainer" style="display: none;"></div>

            <div class="history-section">
                <h2 style="color: #333;">តារាងលទ្ធផលរបស់និស្សិត</h2>
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>ឈ្មោះនិស្សិត</th>
                            <th>អវត្តមាន</th>
                            <th>Midterm</th>
                            <th>Final</th>
                            <th>សរុប</th>
                            <th>លទ្ធផល</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                    </tbody>
                </table>
                
                <button onclick="clearHistory()" class="btn-calculate1">
                   លុបតារាងទិន្នន័យ
                </button>
                <!--<button onclick="clearHistory()" class="reset-btn">លុបតារាងទិន្នន័យ</button>-->
            </div>
        </div>
    </div>

    <script>
        // កំណត់តម្លៃអតិបរមាតាមលក្ខខណ្ឌ
        document.addEventListener('DOMContentLoaded', function() {
            const midtermInput = document.getElementById('midterm_score');
            const finalInput = document.getElementById('final_score');
            const absentInput = document.getElementById('absent_days');

            // ពិនិត្យពេលកំពុងវាយ
            midtermInput.addEventListener('input', function() {
                if (this.value > 60 ) {
                    this.value = 60;
                }
            });

            finalInput.addEventListener('input', function() {
                if (this.value > 40) {
                    this.value = 40;
                }
            });

            absentInput.addEventListener('input', function() {
                if (this.value > 30) {
                    this.value = 30;
                }
            });

            // ពិនិត្យពេលបាត់បង់ focus
            midtermInput.addEventListener('blur', function() {
                if (this.value > 60) {
                    this.value = 60;
                }
            });

            finalInput.addEventListener('blur', function() {
                if (this.value > 40) {
                    this.value = 40;
                }
            });

            absentInput.addEventListener('blur', function() {
                if (this.value >= 30) {
                    this.value = 30;
                }
            });
        });

        // Student Result Calculator Class
        class StudentResultCalculator {
            
            calculateResult(studentName, absentDays, midtermScore, finalScore) {
                // គណនាពិន្ទុសរុប (Total)
                const totalScore = parseFloat(midtermScore) + parseFloat(finalScore);
                
                // ត្រួតពិនិត្យលក្ខខណ្ឌអវត្តមាន
                if (absentDays >= 16) {
                    return {
                        success: true,
                        student_name: studentName,
                        midterm_score: midtermScore,
                        final_score: finalScore,
                        total_score: totalScore,
                        absent_days: absentDays,
                        result: 'រៀនសងឡើងវិញ (អវត្តមានច្រើនពេក)',
                        status: 'fail_retake'
                    };
                } else if (absentDays >= 11 && absentDays <= 15) {
                    return {
                        success: true,
                        student_name: studentName,
                        midterm_score: midtermScore,
                        final_score: finalScore,
                        total_score: totalScore,
                        absent_days: absentDays,
                        result: 'ប្រលងសង (អវត្តមានច្រើន)',
                        status: 'fail_resit'
                    };
                }
                
                // ត្រួតពិនិត្យលក្ខខណ្ឌពិន្ទុ (សម្រាប់អ្នកដែលអវត្តមាន <= 10)
                if (midtermScore < 20) {
                    return {
                        success: true,
                        student_name: studentName,
                        midterm_score: midtermScore,
                        final_score: finalScore,
                        total_score: totalScore,
                        absent_days: absentDays,
                        result: 'រៀនសងឡើងវិញ (ពិន្ទុ Midterm តិចពេក)',
                        status: 'fail_retake'
                    };
                } else if (midtermScore >= 20 && totalScore < 60) {
                    return {
                        success: true,
                        student_name: studentName,
                        midterm_score: midtermScore,
                        final_score: finalScore,
                        total_score: totalScore,
                        absent_days: absentDays,
                        result: 'ប្រលងសង (ពិន្ទុសរុបតិចជាង 60)',
                        status: 'fail_resit'
                    };
                } else if (midtermScore >= 20 && totalScore >= 60) {
                    return {
                        success: true,
                        student_name: studentName,
                        midterm_score: midtermScore,
                        final_score: finalScore,
                        total_score: totalScore,
                        absent_days: absentDays,
                        result: 'ប្រលងជាប់',
                        status: 'pass'
                    };
                } else {
                    return {
                        success: true,
                        student_name: studentName,
                        midterm_score: midtermScore,
                        final_score: finalScore,
                        total_score: totalScore,
                        absent_days: absentDays,
                        result: 'មិនអាចកំណត់លទ្ធផលបាន',
                        status: 'undefined'
                    };
                }
            }
            
            validateInput(studentName, absentDays, midtermScore, finalScore) {
                const errors = [];
                
                if (!studentName || studentName.trim() === '') {
                    errors.push('សូមបញ្ចូលឈ្មោះនិស្សិត');
                }
                
                if (isNaN(absentDays) || absentDays < 0) {
                    errors.push('ចំនួនអវត្តមានត្រូវតែជាលេខ និងមិនអាចតិចជាង 0');
                }
                
                if (isNaN(midtermScore) || midtermScore < 0 || midtermScore > 60) {
                    errors.push('ពិន្ទុ Midterm ត្រូវតែជាលេខពី 0 ដល់ 60');
                }
                
                if (isNaN(finalScore) || finalScore < 0 || finalScore > 40) {
                    errors.push('ពិន្ទុ Final ត្រូវតែជាលេខពី 0 ដល់ 40');
                }
                
                return errors;
            }
        }

        // Initialize calculator and history
        const calculator = new StudentResultCalculator();
        let calculationHistory = JSON.parse(localStorage.getItem('studentResults')) || [];

        // Display history on load
        displayHistory();

        function calculateResult(event) {
            event.preventDefault();
            
            // Get input values
            const studentName = document.getElementById('student_name').value.trim();
            const absentDays = parseInt(document.getElementById('absent_days').value) || 0;
            const midtermScore = parseFloat(document.getElementById('midterm_score').value) || 0;
            const finalScore = parseFloat(document.getElementById('final_score').value) || 0;
            
            // Validate input
            const errors = calculator.validateInput(studentName, absentDays, midtermScore, finalScore);
            
            // Hide previous results
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('errorContainer').style.display = 'none';
            
            if (errors.length > 0) {
                displayErrors(errors);
                return;
            }
            
            // Calculate result
            const result = calculator.calculateResult(studentName, absentDays, midtermScore, finalScore);
            
            if (result.success) {
                displayResult(result);
                saveToHistory(result);
            }
        }

        function displayResult(result) {
            const container = document.getElementById('resultContainer');
            
            let statusClass = '';
            switch (result.status) {
                case 'pass':
                    statusClass = 'pass';
                    break;
                case 'fail_resit':
                    statusClass = 'fail-resit';
                    break;
                case 'fail_retake':
                    statusClass = 'fail-retake';
                    break;
                default:
                    statusClass = 'undefined';
            }
            
            container.innerHTML = `
                <div class="result-card">
                    <h2 class="result-title">លទ្ធផលគណនាសម្រាប់: ${result.student_name}</h2>
                    
                    <div class="result-grid">
                        <div class="result-item">
                            <strong>ពិន្ទុ Midterm</strong>
                            <span>${result.midterm_score.toFixed(2)}</span>
                        </div>
                        <div class="result-item">
                            <strong>ពិន្ទុ Final</strong>
                            <span>${result.final_score.toFixed(2)}</span>
                        </div>
                        <div class="result-item">
                            <strong>ពិន្ទុសរុប</strong>
                            <span>${result.total_score.toFixed(2)}</span>
                        </div>
                        <div class="result-item">
                            <strong>ចំនួនអវត្តមាន</strong>
                            <span>${result.absent_days} ថ្ងៃ</span>
                        </div>
                    </div>

                    <div class="final-result ${statusClass}">
                        ${result.result}
                    </div>
                </div>
            `;
            
            container.style.display = 'block';
        }

        function displayErrors(errors) {
            const container = document.getElementById('errorContainer');
            
            let errorList = '';
            errors.forEach(error => {
                errorList += `<li>${error}</li>`;
            });
            
            container.innerHTML = `
                <div class="error-message">
                    <strong>សូមកែតម្រូវកំហុសខាងក្រោម៖</strong>
                    <ul>
                        ${errorList}
                    </ul>
                </div>
            `;
            
            container.style.display = 'block';
        }

        function saveToHistory(result) {
            // Keep only last 10 calculations
            calculationHistory.unshift({
                student_name: result.student_name,
                absent_days: result.absent_days,
                midterm_score: result.midterm_score,
                final_score: result.final_score,
                total_score: result.total_score,
                result: result.result,
                status: result.status
            });
            
            if (calculationHistory.length > 10) {
                calculationHistory.pop();
            }
            
            // Save to localStorage
            localStorage.setItem('studentResults', JSON.stringify(calculationHistory));
            
            // Update display
            displayHistory();
        }

        function displayHistory() {
            const historyBody = document.getElementById('historyBody');
            
            if (calculationHistory.length === 0) {
                historyBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">មិនទាន់មានទិន្នន័យនៅឡើយទេ</td></tr>';
                return;
            }
            
            let rows = '';
            calculationHistory.forEach(item => {
                let statusClass = '';
                switch (item.status) {
                    case 'pass':
                        statusClass = 'status-pass';
                        break;
                    case 'fail_resit':
                        statusClass = 'status-resit';
                        break;
                    case 'fail_retake':
                        statusClass = 'status-retake';
                        break;
                }
                
                rows += `
                    <tr>
                        <td>${item.student_name}</td>
                        <td>${item.absent_days}</td>
                        <td>${item.midterm_score.toFixed(2)}</td>
                        <td>${item.final_score.toFixed(2)}</td>
                        <td>${item.total_score.toFixed(2)}</td>
                        <td class="${statusClass}">${item.result}</td>
                    </tr>
                `;
            });
            
            historyBody.innerHTML = rows;
        }

        function clearHistory() {
            if (confirm('តើអ្នកប្រាកដថាចង់លុបតារាងទិន្នន័យទាំងអស់ទេ?')) {
                calculationHistory = [];
                localStorage.removeItem('studentResults');
                displayHistory();
            }
        }
    </script>
</body>
</html>
